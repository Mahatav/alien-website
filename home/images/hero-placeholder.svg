<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grey"/>
      <feBlend in="SourceGraphic" in2="grey" mode="multiply" result="blend"/>
      <feComponentTransfer in="blend">
        <feFuncA type="linear" slope="1"/>
      </feComponentTransfer>
    </filter>
    <filter id="blur-vignette">
      <feGaussianBlur stdDeviation="0.4"/>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.7)"/>
    </radialGradient>
  </defs>

  <!-- dark background -->
  <rect width="1200" height="800" fill="#0a0a0a"/>

  <!-- atmospheric haze bands -->
  <rect x="0" y="200" width="1200" height="120" fill="#1a1a14" opacity="0.4"/>
  <rect x="0" y="440" width="1200" height="80" fill="#0f0f0a" opacity="0.3"/>

  <!-- UFO silhouette — classic disc shape -->
  <g transform="translate(580, 320)" opacity="0.72">
    <!-- upper dome -->
    <ellipse cx="0" cy="-18" rx="55" ry="30" fill="#2a2a22"/>
    <!-- main disc body -->
    <ellipse cx="0" cy="0" rx="130" ry="28" fill="#1e1e18"/>
    <!-- disc underside glow -->
    <ellipse cx="0" cy="6" rx="80" ry="12" fill="#3a3a28" opacity="0.6"/>
    <!-- port lights around rim -->
    <circle cx="-90" cy="-2" r="4" fill="#c8c840" opacity="0.8"/>
    <circle cx="-60" cy="-8" r="3.5" fill="#c8c840" opacity="0.7"/>
    <circle cx="-28" cy="-12" r="3.5" fill="#d4d450" opacity="0.9"/>
    <circle cx="0" cy="-14" r="4" fill="#e0e060" opacity="1"/>
    <circle cx="28" cy="-12" r="3.5" fill="#d4d450" opacity="0.9"/>
    <circle cx="60" cy="-8" r="3.5" fill="#c8c840" opacity="0.7"/>
    <circle cx="90" cy="-2" r="4" fill="#c8c840" opacity="0.8"/>
    <!-- beam of light downward -->
    <path d="M-40 14 L-90 120 L90 120 L40 14" fill="#d4d428" opacity="0.06"/>
  </g>

  <!-- distant treeline silhouette -->
  <path d="M0 680 L60 640 L80 655 L120 610 L150 635 L200 595 L230 620 L280 580 L310 600 L370 560 L400 582 L450 545 L480 568 L540 530 L570 555 L630 518 L660 542 L720 500 L760 525 L810 490 L850 514 L910 475 L950 500 L1010 462 L1060 488 L1120 450 L1160 475 L1200 460 L1200 800 L0 800 Z" fill="#0d0d08" opacity="0.9"/>

  <!-- film grain overlay -->
  <rect width="1200" height="800" fill="white" filter="url(#grain)" opacity="0.12"/>

  <!-- vignette -->
  <rect width="1200" height="800" fill="url(#vignette)"/>

  <!-- scan line texture -->
  <rect width="1200" height="800" fill="url(#scanlines)" opacity="0.08"/>
  <defs>
    <pattern id="scanlines" x="0" y="0" width="1200" height="3" patternUnits="userSpaceOnUse">
      <rect width="1200" height="1" fill="black" y="0"/>
      <rect width="1200" height="2" fill="transparent" y="1"/>
    </pattern>
  </defs>

  <!-- corner timestamp -->
  <text x="28" y="752" font-family="Courier New, monospace" font-size="13" fill="#c8c840" opacity="0.55" letter-spacing="2">1947-07-04  02:17:43</text>
  <text x="1172" y="752" font-family="Courier New, monospace" font-size="13" fill="#c8c840" opacity="0.55" letter-spacing="2" text-anchor="end">FRAME 0047</text>

  <!-- classification watermark -->
  <text x="600" y="400" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#c0000a" opacity="0.07" text-anchor="middle" letter-spacing="18">CLASSIFIED</text>
</svg>
