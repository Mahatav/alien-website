events {
    worker_connections 1024;
}

http {
    # 1 = cookie present, 0 = not present
    map $http_cookie $dwp_unlocked {
        default          0;
        "~(^|;\s)dwp_unlocked=1" 1;
    }

    server {
        listen 80;

        # Block direct access to /gate without home-page cookie
        location ~ ^/gate(/.*)?$ {
            if ($dwp_unlocked = 0) {
                return 302 $scheme://$http_host/;
            }
            proxy_pass         http://app:8000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        location / {
            proxy_pass         http://app:8000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }
    }
}
