events {
    worker_connections 1024;
}

http {
    server {
        listen 80;

        # The /gate roll is enforced client-side now (see terminal/index.html), not by a
        # cookie at the edge — so nginx just proxies everything straight through to the app.
        location / {
            proxy_pass         http://app:8000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }
    }
}
